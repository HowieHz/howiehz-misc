name: Graphwar Agent Build

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/graphwar-agent-build.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "docs/public/graphwar-agent.jar"
      - "docs/public/graphwar-agent.json"
      - "packages/graphwar-agent/**"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - ".github/workflows/graphwar-agent-build.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "docs/public/graphwar-agent.jar"
      - "docs/public/graphwar-agent.json"
      - "packages/graphwar-agent/**"
  workflow_dispatch:

concurrency:
  group: |
    ${{
      (github.event_name == 'pull_request') && format('graphwar-agent-build-pr-{0}', github.event.pull_request.number) ||
      (github.event_name == 'push') && format('graphwar-agent-build-{0}', github.ref) ||
      format('graphwar-agent-build-{0}', github.run_id)
    }}
  cancel-in-progress: true

jobs:
  build:
    name: Build graphwar-agent
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # https://github.com/actions/checkout/releases/tag/v7.0.1
        with:
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0
          # Same reason as nodejs-ci.yml: commits made with github.token do not start follow-up workflows.
          token: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # https://github.com/pnpm/action-setup/releases/tag/v6.0.9
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # https://github.com/actions/setup-node/releases/tag/v7.0.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # https://github.com/actions/setup-java/tree/v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build graphwar-agent
        run: pnpm --filter graphwar-agent build

      - name: Test graphwar-agent
        run: pnpm --filter graphwar-agent test

      - name: Smoke test agent jar
        run: java -javaagent:packages/graphwar-agent/build/libs/graphwar-agent.jar -version

      - name: Sync public graphwar-agent jar
        run: pnpm --filter graphwar-agent sync:public

      - name: Check public artifact diff
        id: public-jar-diff
        run: |
          git add --intent-to-add -- docs/public/graphwar-agent.jar docs/public/graphwar-agent.json
          if git diff --exit-code --quiet -- docs/public/graphwar-agent.jar docs/public/graphwar-agent.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --short -- docs/public/graphwar-agent.jar docs/public/graphwar-agent.json
          fi

      - name: Commit public jar update
        if: steps.public-jar-diff.outputs.has_changes == 'true' && (github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository))
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # https://github.com/stefanzweifel/git-auto-commit-action/releases/tag/v7.2.0
        with:
          commit_message: |
            chore(graphwar-agent): update public agent jar
          file_pattern: docs/public/graphwar-agent.jar docs/public/graphwar-agent.json

      - name: Upload graphwar-agent jar
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # https://github.com/actions/upload-artifact/releases/tag/v7.0.1
        with:
          path: packages/graphwar-agent/build/libs/graphwar-agent.jar
          archive: false
          if-no-files-found: error

      - name: Fail fork PR with public jar drift
        if: steps.public-jar-diff.outputs.has_changes == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "The public Graphwar Agent artifacts differ from the build, but this PR comes from a fork and CI cannot push the update." >&2
          echo "Run 'pnpm --filter graphwar-agent build && pnpm --filter graphwar-agent sync:public' locally and commit docs/public/graphwar-agent.jar and docs/public/graphwar-agent.json." >&2
          exit 1
