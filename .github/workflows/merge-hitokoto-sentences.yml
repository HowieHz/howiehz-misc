name: Merge Hitokoto Sentences

on:
  schedule:
    # 20:00 UTC = 04:00 Asia/Shanghai on the next day.
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      initialize:
        description: Create a new bundle category and upload the latest source snapshot as the initial dataset.
        required: false
        type: boolean
        default: false

concurrency:
  group: merge-hitokoto-sentences
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # https://github.com/actions/checkout/releases/tag/v7.0.0

      - name: Setup Node.js
        id: setup_node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # https://github.com/actions/setup-node/releases/tag/v7.0.0
        with:
          node-version: 24

      - name: Fetch source repository
        id: fetch_source
        run: |
          git clone --filter=blob:none --sparse https://github.com/hitokoto-osc/sentences-bundle.git tmp/sentences-bundle
          git -C tmp/sentences-bundle sparse-checkout set sentences
          echo "source_commit=$(git -C tmp/sentences-bundle rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Merge JSON files
        id: merge
        run: >
          node --experimental-strip-types .github/scripts/merge-hitokoto-sentences.ts
          --input tmp/sentences-bundle/sentences
          --output tmp/hitokoto-sentences.json

      - name: Upload merged artifact
        id: upload_artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # https://github.com/actions/upload-artifact/releases/tag/v7.0.1
        with:
          name: hitokoto-sentences
          path: ${{ steps.merge.outputs.output_file }}
          if-no-files-found: error
          retention-days: 30

      # 第一步：复用固定分类 hitokoto-sentences-bundle；如果分类不存在，就创建一个。
      - name: Find or create Hitokoto bundle category
        id: bundle_category
        env:
          HITOKOTO_PAT: ${{ secrets.HITOKOTO_PAT }}
          SITE_ENDPOINT: ${{ secrets.SITE_ENDPOINT }}
          BUNDLE_CATEGORY_DISPLAY_NAME: hitokoto-sentences-bundle
          CURRENT_SOURCE_COMMIT: ${{ steps.fetch_source.outputs.source_commit }}
          INITIALIZE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.initialize }}
        run: |
          node <<'EOF'
          (async () => {
          const fs = require("node:fs");

          const requiredEnv = ["HITOKOTO_PAT", "SITE_ENDPOINT", "BUNDLE_CATEGORY_DISPLAY_NAME", "CURRENT_SOURCE_COMMIT", "INITIALIZE_MODE"];
          for (const envName of requiredEnv) {
            if (!process.env[envName]) {
              throw new Error(`Missing required environment variable: ${envName}`);
            }
          }

          const siteEndpoint = process.env.SITE_ENDPOINT.replace(/\/+$/, "");
          const categoriesUrl = `${siteEndpoint}/apis/hitokotohub.puresky.top/v1alpha1/categories`;
          const commonHeaders = {
            Authorization: `Bearer ${process.env.HITOKOTO_PAT}`,
            Accept: "application/json",
          };
          const fetchJson = async (url, errorMessage) => {
            const response = await fetch(url, {
              method: "GET",
              headers: commonHeaders,
            });

            if (!response.ok) {
              const errorText = await response.text();
              throw new Error(`${errorMessage}: ${response.status} ${response.statusText}\n${errorText}`);
            }

            return response.json();
          };

          let existingCategory = null;
          const pageSize = 100;

          if (process.env.INITIALIZE_MODE !== "true") {
            for (let page = 1; ; page += 1) {
              console.log(`Scanning category page ${page}`);
              const listPayload = await fetchJson(`${categoriesUrl}?page=${page}&size=${pageSize}`, "Failed to list categories");
              const categoryItems = Array.isArray(listPayload?.items) ? listPayload.items : [];
              existingCategory = categoryItems.find((item) => {
                const metadataName = item?.metadata?.name;
                const specName = item?.spec?.name;

                return metadataName === process.env.BUNDLE_CATEGORY_DISPLAY_NAME || specName === process.env.BUNDLE_CATEGORY_DISPLAY_NAME;
              });

              if (existingCategory || listPayload?.hasNext !== true) {
                break;
              }
            }
          }

          if (existingCategory) {
            const existingCategoryName = existingCategory?.metadata?.name;

            if (typeof existingCategoryName !== "string" || existingCategoryName.length === 0) {
              throw new Error("Existing category does not include metadata.name");
            }

            console.log(`Using existing category: ${existingCategoryName}`);
            const categoryDetail = await fetchJson(`${categoriesUrl}/${encodeURIComponent(existingCategoryName)}`, `Failed to get category ${existingCategoryName}`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `category_name=${existingCategoryName}\n`, "utf8");
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `category_description=${categoryDetail?.spec?.description ?? ""}\n`, "utf8");
            fs.appendFileSync(process.env.GITHUB_OUTPUT, "initialized=false\n", "utf8");
            return;
          }

          console.log("Creating bundle category");
          const requestBody = {
            apiVersion: "hitokotohub.puresky.top/v1alpha1",
            kind: "Category",
            metadata: {
              generateName: "category-",
              name: "",
            },
            spec: {
              description: process.env.INITIALIZE_MODE === "true" ? "" : process.env.CURRENT_SOURCE_COMMIT,
              name: process.env.BUNDLE_CATEGORY_DISPLAY_NAME,
            },
          };

          const response = await fetch(categoriesUrl, {
            method: "POST",
            headers: {
              ...commonHeaders,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(requestBody),
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Failed to create category: ${response.status} ${response.statusText}\n${errorText}`);
          }

          const createdCategory = await response.json();
          const createdCategoryName = createdCategory?.metadata?.name;

          if (typeof createdCategoryName !== "string" || createdCategoryName.length === 0) {
            throw new Error("Category creation response does not include metadata.name");
          }

          console.log(`Created category: ${createdCategoryName}`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `category_name=${createdCategoryName}\n`, "utf8");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `category_description=${createdCategory?.spec?.description ?? ""}\n`, "utf8");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `initialized=${process.env.INITIALIZE_MODE === "true"}\n`, "utf8");
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      # 第二步：按分类描述里的 GitHub commit hash 构建旧版本；描述为空时以当前 commit 初始化基线。
      - name: Build previous merged file from category description
        id: build_previous
        env:
          PREVIOUS_SOURCE_COMMIT: ${{ steps.bundle_category.outputs.category_description }}
          CURRENT_SOURCE_COMMIT: ${{ steps.fetch_source.outputs.source_commit }}
          INITIALIZE_MODE: ${{ steps.bundle_category.outputs.initialized }}
        run: |
          DESCRIPTION_COMMIT="${PREVIOUS_SOURCE_COMMIT}"

          if [ "${INITIALIZE_MODE}" = "true" ]; then
            mkdir -p tmp/previous-hitokoto-sentences
            printf '[]\n' > tmp/previous-hitokoto-sentences/hitokoto-sentences.json
            DESCRIPTION_COMMIT="initialization-empty-baseline"
          elif ! printf '%s' "${DESCRIPTION_COMMIT}" | grep -Eq '^[0-9a-fA-F]{40}$'; then
            DESCRIPTION_COMMIT="${CURRENT_SOURCE_COMMIT}"

            git -C tmp/sentences-bundle checkout --detach "${DESCRIPTION_COMMIT}"
            node --experimental-strip-types .github/scripts/merge-hitokoto-sentences.ts \
              --input tmp/sentences-bundle/sentences \
              --output tmp/previous-hitokoto-sentences/hitokoto-sentences.json
            git -C tmp/sentences-bundle checkout --detach "${CURRENT_SOURCE_COMMIT}"
          else
            git -C tmp/sentences-bundle checkout --detach "${DESCRIPTION_COMMIT}"
            node --experimental-strip-types .github/scripts/merge-hitokoto-sentences.ts \
              --input tmp/sentences-bundle/sentences \
              --output tmp/previous-hitokoto-sentences/hitokoto-sentences.json
            git -C tmp/sentences-bundle checkout --detach "${CURRENT_SOURCE_COMMIT}"
          fi
          {
            echo "baseline_source=category_description"
            echo "source_commit=${DESCRIPTION_COMMIT}"
          } >> "${GITHUB_OUTPUT}"

      # 第三步：按 hitokoto 文本比较描述 hash 和最新 hash 的合并结果，分别输出新增和被移除的句子。
      - name: Find sentence changes
        id: diff
        env:
          CURRENT_JSON_FILE: ${{ steps.merge.outputs.output_file }}
          PREVIOUS_JSON_FILE: tmp/previous-hitokoto-sentences/hitokoto-sentences.json
          ADDED_JSON_FILE: tmp/new-hitokoto-sentences.json
          REMOVED_JSON_FILE: tmp/removed-hitokoto-sentences.json
        run: |
          node <<'EOF'
          (async () => {
          const fs = require("node:fs");
          const path = require("node:path");

          const requiredEnv = ["CURRENT_JSON_FILE", "PREVIOUS_JSON_FILE", "ADDED_JSON_FILE", "REMOVED_JSON_FILE"];
          for (const envName of requiredEnv) {
            if (!process.env[envName]) {
              throw new Error(`Missing required environment variable: ${envName}`);
            }
          }

          const readSentenceArray = (filePath) => {
            console.log(`Reading sentence file: ${filePath}`);
            if (!fs.existsSync(filePath)) {
              throw new Error(`JSON file does not exist: ${filePath}`);
            }

            const parsed = JSON.parse(fs.readFileSync(filePath, "utf8"));

            if (!Array.isArray(parsed)) {
              throw new Error(`JSON file must contain an array: ${filePath}`);
            }

            return parsed;
          };

          const currentSentences = readSentenceArray(process.env.CURRENT_JSON_FILE);
          const previousSentences = readSentenceArray(process.env.PREVIOUS_JSON_FILE);
          console.log("Building hitokoto lookup sets");
          const previousHitokotoValues = new Set(
            previousSentences
              .map((sentence) => sentence?.hitokoto)
              .filter((hitokoto) => typeof hitokoto === "string"),
          );
          const currentHitokotoValues = new Set(
            currentSentences
              .map((sentence) => sentence?.hitokoto)
              .filter((hitokoto) => typeof hitokoto === "string"),
          );
          const addedSentences = currentSentences.filter((sentence) => {
            const hitokoto = sentence?.hitokoto;

            return typeof hitokoto === "string" && !previousHitokotoValues.has(hitokoto);
          });
          const removedSentences = previousSentences.filter((sentence) => {
            const hitokoto = sentence?.hitokoto;

            return typeof hitokoto === "string" && !currentHitokotoValues.has(hitokoto);
          });

          console.log("Writing diff output files");
          fs.mkdirSync(path.dirname(process.env.ADDED_JSON_FILE), { recursive: true });
          fs.writeFileSync(process.env.ADDED_JSON_FILE, `${JSON.stringify(addedSentences)}\n`, "utf8");
          fs.writeFileSync(process.env.REMOVED_JSON_FILE, `${JSON.stringify(removedSentences)}\n`, "utf8");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `added_output_file=${process.env.ADDED_JSON_FILE}\n`, "utf8");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `added_sentence_count=${addedSentences.length}\n`, "utf8");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `removed_output_file=${process.env.REMOVED_JSON_FILE}\n`, "utf8");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `removed_sentence_count=${removedSentences.length}\n`, "utf8");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `previous_sentence_count=${previousSentences.length}\n`, "utf8");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `current_sentence_count=${currentSentences.length}\n`, "utf8");
          console.log(`Previous sentences: ${previousSentences.length}`);
          console.log(`Current sentences: ${currentSentences.length}`);
          console.log(`New sentences: ${addedSentences.length}`);
          console.log(`Removed sentences: ${removedSentences.length}`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      # 第四步：对已经从源句库移除的句子，先在固定分类内搜索，再按精确 content 匹配删除。
      - name: Delete removed sentences from bundle category
        id: delete_removed
        env:
          HITOKOTO_PAT: ${{ secrets.HITOKOTO_PAT }}
          SITE_ENDPOINT: ${{ secrets.SITE_ENDPOINT }}
          CATEGORY_NAME: ${{ steps.bundle_category.outputs.category_name }}
          REMOVED_JSON_FILE: ${{ steps.diff.outputs.removed_output_file }}
        run: |
          node <<'EOF'
          const fs = require("node:fs");
          let deletedSentenceCount = 0;

          const appendOutput = (name, value) => {
            if (process.env.GITHUB_OUTPUT) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `${name}=${value}\n`, "utf8");
            }
          };

          (async () => {

          const requiredEnv = ["HITOKOTO_PAT", "SITE_ENDPOINT", "CATEGORY_NAME", "REMOVED_JSON_FILE"];
          for (const envName of requiredEnv) {
            if (!process.env[envName]) {
              throw new Error(`Missing required environment variable: ${envName}`);
            }
          }

          const removedJsonText = fs.readFileSync(process.env.REMOVED_JSON_FILE, "utf8");
          const removedSentences = JSON.parse(removedJsonText);

          if (!Array.isArray(removedSentences)) {
            throw new Error("Removed sentences JSON file must contain an array");
          }

          if (removedSentences.length === 0) {
            console.log(`No removed sentences to delete from ${process.env.CATEGORY_NAME}`);
            appendOutput("deleted_sentence_count", "0");
            return;
          }

          const siteEndpoint = process.env.SITE_ENDPOINT.replace(/\/+$/, "");
          const searchUrl = `${siteEndpoint}/apis/console.api.hitokotohub.puresky.top/v1alpha1/sentence/search`;
          const sentencesUrl = `${siteEndpoint}/apis/hitokotohub.puresky.top/v1alpha1/sentences`;
          const commonHeaders = {
            Authorization: `Bearer ${process.env.HITOKOTO_PAT}`,
            Accept: "application/json",
          };
          const deletedSentenceNames = new Set();
          const logProgress = (prefix, index, total) => {
            if (index === 1 || index === total || index % 100 === 0) {
              console.log(`${prefix}: ${index}/${total}`);
            }
          };

          console.log(`Searching removed sentences before deletion: ${removedSentences.length} candidates`);
          for (let index = 0; index < removedSentences.length; index += 1) {
            const removedSentence = removedSentences[index];
            logProgress("Searching removed sentence", index + 1, removedSentences.length);
            const hitokoto = removedSentence?.hitokoto;

            if (typeof hitokoto !== "string" || hitokoto.length === 0) {
              continue;
            }

            const url = new URL(searchUrl);
            url.searchParams.set("keyword", hitokoto);
            url.searchParams.set("categoryName", process.env.CATEGORY_NAME);

            const searchResponse = await fetch(url, {
              method: "GET",
              headers: commonHeaders,
            });

            if (!searchResponse.ok) {
              const errorText = await searchResponse.text();
              throw new Error(`Failed to search sentence: ${searchResponse.status} ${searchResponse.statusText}\n${errorText}`);
            }

            const searchResult = await searchResponse.json();

            if (!Array.isArray(searchResult)) {
              throw new Error("Search sentence response must contain an array");
            }

            const sentencesToDelete = searchResult.filter((sentence) => {
              const sentenceName = sentence?.metadata?.name;

              return (
                typeof sentenceName === "string" &&
                sentenceName.length > 0 &&
                sentence?.spec?.content === hitokoto &&
                sentence?.spec?.categoryName === process.env.CATEGORY_NAME &&
                !deletedSentenceNames.has(sentenceName)
              );
            });

            for (let deleteIndex = 0; deleteIndex < sentencesToDelete.length; deleteIndex += 1) {
              const sentence = sentencesToDelete[deleteIndex];
              const sentenceName = sentence.metadata.name;
              console.log(`Deleting matched sentence ${deleteIndex + 1}/${sentencesToDelete.length} for removed candidate ${index + 1}/${removedSentences.length}: ${sentenceName}`);
              const deleteResponse = await fetch(`${sentencesUrl}/${encodeURIComponent(sentenceName)}`, {
                method: "DELETE",
                headers: commonHeaders,
              });

              if (!deleteResponse.ok) {
                const errorText = await deleteResponse.text();
                throw new Error(`Failed to delete sentence ${sentenceName}: ${deleteResponse.status} ${deleteResponse.statusText}\n${errorText}`);
              }

              deletedSentenceNames.add(sentenceName);
              deletedSentenceCount = deletedSentenceNames.size;
              console.log(`Deleted sentence: ${sentenceName}`);
            }

            if (sentencesToDelete.length === 0) {
              console.log(`No matching sentence found to delete: ${hitokoto}`);
            }
          }

          console.log(`Deleted ${deletedSentenceNames.size} sentences from ${process.env.CATEGORY_NAME}`);
          appendOutput("deleted_sentence_count", String(deletedSentenceNames.size));
          })().catch((error) => {
            appendOutput("deleted_sentence_count", String(deletedSentenceCount));
            console.error(error);
            process.exit(1);
          });
          EOF

      # 第五步：把新增句子转成批量接口需要的 Sentence 结构；普通同步上传前先搜索，初始化新分类时直接批量上传。
      - name: Upload new sentences to bundle category
        id: upload_new
        env:
          HITOKOTO_PAT: ${{ secrets.HITOKOTO_PAT }}
          SITE_ENDPOINT: ${{ secrets.SITE_ENDPOINT }}
          CATEGORY_NAME: ${{ steps.bundle_category.outputs.category_name }}
          ADDED_JSON_FILE: ${{ steps.diff.outputs.added_output_file }}
          INITIALIZE_MODE: ${{ steps.bundle_category.outputs.initialized }}
        run: |
          node <<'EOF'
          const fs = require("node:fs");
          let uploadedSentenceCount = 0;

          const appendOutput = (name, value) => {
            if (process.env.GITHUB_OUTPUT) {
              fs.appendFileSync(process.env.GITHUB_OUTPUT, `${name}=${value}\n`, "utf8");
            }
          };

          (async () => {

          const requiredEnv = ["HITOKOTO_PAT", "SITE_ENDPOINT", "CATEGORY_NAME", "ADDED_JSON_FILE", "INITIALIZE_MODE"];
          for (const envName of requiredEnv) {
            if (!process.env[envName]) {
              throw new Error(`Missing required environment variable: ${envName}`);
            }
          }

          const siteEndpoint = process.env.SITE_ENDPOINT.replace(/\/+$/, "");
          const url = `${siteEndpoint}/apis/console.api.hitokotohub.puresky.top/v1alpha1/sentence/-/batch`;
          const searchUrl = `${siteEndpoint}/apis/console.api.hitokotohub.puresky.top/v1alpha1/sentence/search`;
          const addedJsonText = fs.readFileSync(process.env.ADDED_JSON_FILE, "utf8");
          const addedSentences = JSON.parse(addedJsonText);

          if (!Array.isArray(addedSentences)) {
            throw new Error("Added sentences JSON file must contain an array");
          }

          if (addedSentences.length === 0) {
            console.log(`No new sentences to upload to ${process.env.CATEGORY_NAME}`);
            appendOutput("skipped_existing_sentence_count", "0");
            appendOutput("uploaded_sentence_count", "0");
            return;
          }

          const commonHeaders = {
            Authorization: `Bearer ${process.env.HITOKOTO_PAT}`,
            Accept: "application/json",
          };
          let skippedExistingSentenceCount = 0;
          const sentencesToUpload = [];
          const logProgress = (prefix, index, total) => {
            if (index === 1 || index === total || index % 100 === 0) {
              console.log(`${prefix}: ${index}/${total}`);
            }
          };

          if (process.env.INITIALIZE_MODE === "true") {
            console.log(`Initialize mode enabled; skipping duplicate search for ${addedSentences.length} sentences`);
            sentencesToUpload.push(...addedSentences);
          } else {
            console.log(`Searching existing sentences before upload: ${addedSentences.length} candidates`);
            for (let index = 0; index < addedSentences.length; index += 1) {
              const sentence = addedSentences[index];
              logProgress("Searching upload candidate", index + 1, addedSentences.length);
              const hitokoto = sentence?.hitokoto;

              if (typeof hitokoto !== "string" || hitokoto.length === 0) {
                continue;
              }

              const searchRequestUrl = new URL(searchUrl);
              searchRequestUrl.searchParams.set("keyword", hitokoto);
              searchRequestUrl.searchParams.set("categoryName", process.env.CATEGORY_NAME);

              const searchResponse = await fetch(searchRequestUrl, {
                method: "GET",
                headers: commonHeaders,
              });

              if (!searchResponse.ok) {
                const errorText = await searchResponse.text();
                throw new Error(`Failed to search sentence before upload: ${searchResponse.status} ${searchResponse.statusText}\n${errorText}`);
              }

              const searchResult = await searchResponse.json();

              if (!Array.isArray(searchResult)) {
                throw new Error("Search sentence response must contain an array");
              }

              const alreadyExists = searchResult.some(
                (existingSentence) =>
                  existingSentence?.spec?.content === hitokoto && existingSentence?.spec?.categoryName === process.env.CATEGORY_NAME,
              );

              if (alreadyExists) {
                skippedExistingSentenceCount += 1;
                continue;
              }

              sentencesToUpload.push(sentence);
            }
          }

          appendOutput("skipped_existing_sentence_count", String(skippedExistingSentenceCount));

          if (sentencesToUpload.length === 0) {
            console.log(`No new non-duplicate sentences to upload to ${process.env.CATEGORY_NAME}`);
            appendOutput("uploaded_sentence_count", "0");
            return;
          }

          console.log(`Preparing batch upload body for ${sentencesToUpload.length} sentences`);
          const requestBody = sentencesToUpload.map((sentence) => ({
            // 这个 batch 接口实测不要求 apiVersion / kind / metadata.name，
            // 因此这里保留最小可用结构即可。
            // apiVersion: "hitokotohub.puresky.top/v1alpha1",
            // kind: "Sentence",
            metadata: {
              generateName: "sentence-",
              // name: "",
            },
            spec: {
              // content 对应 hitokoto。
              content: sentence.hitokoto,
              categoryName: process.env.CATEGORY_NAME,
              // author 对应 from_who；为空时按示例回退为“匿名”。
              author:
                typeof sentence.from_who === "string" && sentence.from_who.trim().length > 0
                  ? sentence.from_who
                  : "匿名",
              // source 对应 from。
              source: sentence.from,
            },
          }));

          console.log(`Uploading ${requestBody.length} sentences in one batch`);
          const response = await fetch(url, {
            method: "POST",
            headers: {
              ...commonHeaders,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(requestBody),
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Failed to upload sentences: ${response.status} ${response.statusText}\n${errorText}`);
          }

          uploadedSentenceCount = requestBody.length;
          console.log(`Uploaded ${requestBody.length} sentences to ${process.env.CATEGORY_NAME}`);
          appendOutput("uploaded_sentence_count", String(uploadedSentenceCount));
          })().catch((error) => {
            appendOutput("uploaded_sentence_count", String(uploadedSentenceCount));
            console.error(error);
            process.exit(1);
          });
          EOF

      # 第六步：删除和上传都成功后，把分类描述更新为当前源仓库 commit hash，作为下次同步游标。
      - name: Update bundle category cursor
        id: update_category_cursor
        env:
          HITOKOTO_PAT: ${{ secrets.HITOKOTO_PAT }}
          SITE_ENDPOINT: ${{ secrets.SITE_ENDPOINT }}
          CATEGORY_NAME: ${{ steps.bundle_category.outputs.category_name }}
          CURRENT_SOURCE_COMMIT: ${{ steps.fetch_source.outputs.source_commit }}
        run: |
          node <<'EOF'
          (async () => {
          const fs = require("node:fs");

          const requiredEnv = ["HITOKOTO_PAT", "SITE_ENDPOINT", "CATEGORY_NAME", "CURRENT_SOURCE_COMMIT"];
          for (const envName of requiredEnv) {
            if (!process.env[envName]) {
              throw new Error(`Missing required environment variable: ${envName}`);
            }
          }

          const siteEndpoint = process.env.SITE_ENDPOINT.replace(/\/+$/, "");
          const categoryUrl = `${siteEndpoint}/apis/hitokotohub.puresky.top/v1alpha1/categories/${encodeURIComponent(process.env.CATEGORY_NAME)}`;
          const commonHeaders = {
            Authorization: `Bearer ${process.env.HITOKOTO_PAT}`,
            Accept: "application/json",
          };
          const getResponse = await fetch(categoryUrl, {
            method: "GET",
            headers: commonHeaders,
          });

          if (!getResponse.ok) {
            const errorText = await getResponse.text();
            throw new Error(`Failed to get category before cursor update: ${getResponse.status} ${getResponse.statusText}\n${errorText}`);
          }

          const category = await getResponse.json();
          const patchOperation = Object.hasOwn(category?.spec ?? {}, "description") ? "replace" : "add";
          console.log(`Updating category cursor with JSON Patch operation: ${patchOperation}`);
          const updateResponse = await fetch(categoryUrl, {
            method: "PATCH",
            headers: {
              ...commonHeaders,
              "Content-Type": "application/json-patch+json",
            },
            body: JSON.stringify([
              {
                op: patchOperation,
                path: "/spec/description",
                value: process.env.CURRENT_SOURCE_COMMIT,
              },
            ]),
          });

          if (!updateResponse.ok) {
            const errorText = await updateResponse.text();
            throw new Error(`Failed to update category cursor: ${updateResponse.status} ${updateResponse.statusText}\n${errorText}`);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `updated_description=${process.env.CURRENT_SOURCE_COMMIT}\n`, "utf8");
          console.log(`Updated category cursor to ${process.env.CURRENT_SOURCE_COMMIT}`);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Write sync summary
        if: ${{ always() }}
        env:
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          SETUP_NODE_OUTCOME: ${{ steps.setup_node.outcome }}
          FETCH_SOURCE_OUTCOME: ${{ steps.fetch_source.outcome }}
          MERGE_OUTCOME: ${{ steps.merge.outcome }}
          UPLOAD_ARTIFACT_OUTCOME: ${{ steps.upload_artifact.outcome }}
          BUILD_PREVIOUS_OUTCOME: ${{ steps.build_previous.outcome }}
          DIFF_OUTCOME: ${{ steps.diff.outcome }}
          CATEGORY_OUTCOME: ${{ steps.bundle_category.outcome }}
          DELETE_OUTCOME: ${{ steps.delete_removed.outcome }}
          UPLOAD_OUTCOME: ${{ steps.upload_new.outcome }}
          UPDATE_CURSOR_OUTCOME: ${{ steps.update_category_cursor.outcome }}
          INITIALIZE_MODE: ${{ steps.bundle_category.outputs.initialized }}
          CATEGORY_DESCRIPTION: ${{ steps.bundle_category.outputs.category_description }}
          BASELINE_SOURCE_COMMIT: ${{ steps.build_previous.outputs.source_commit }}
          CURRENT_SOURCE_COMMIT: ${{ steps.fetch_source.outputs.source_commit }}
          UPDATED_CATEGORY_DESCRIPTION: ${{ steps.update_category_cursor.outputs.updated_description }}
          PREVIOUS_SENTENCE_COUNT: ${{ steps.diff.outputs.previous_sentence_count }}
          CURRENT_SENTENCE_COUNT: ${{ steps.diff.outputs.current_sentence_count }}
          ADDED_SENTENCE_COUNT: ${{ steps.diff.outputs.added_sentence_count }}
          REMOVED_SENTENCE_COUNT: ${{ steps.diff.outputs.removed_sentence_count }}
          UPLOADED_SENTENCE_COUNT: ${{ steps.upload_new.outputs.uploaded_sentence_count }}
          DELETED_SENTENCE_COUNT: ${{ steps.delete_removed.outputs.deleted_sentence_count }}
          SKIPPED_EXISTING_SENTENCE_COUNT: ${{ steps.upload_new.outputs.skipped_existing_sentence_count }}
          ADDED_JSON_FILE: ${{ steps.diff.outputs.added_output_file }}
          REMOVED_JSON_FILE: ${{ steps.diff.outputs.removed_output_file }}
        run: |
          node <<'EOF'
          const fs = require("node:fs");

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;

          if (!summaryPath) {
            throw new Error("Missing GITHUB_STEP_SUMMARY");
          }

          const valueOrDash = (value) => (typeof value === "string" && value.length > 0 ? value : "-");
          const stepOutcome = (value) => valueOrDash(value);
          const countValue = (value) => valueOrDash(value);

          const readSentenceArray = (filePath) => {
            if (!filePath || !fs.existsSync(filePath)) {
              return null;
            }

            const parsed = JSON.parse(fs.readFileSync(filePath, "utf8"));

            if (!Array.isArray(parsed)) {
              return null;
            }

            return parsed;
          };

          const formatSentence = (sentence) => {
            const hitokoto = sentence?.hitokoto;
            const text = typeof hitokoto === "string" ? hitokoto : JSON.stringify(sentence);

            return String(text).replace(/\r?\n/g, " ").trim();
          };

          const renderSentenceList = (title, filePath, totalCount) => {
            const sentences = readSentenceArray(filePath);
            const lines = [`### ${title}`];

            if (!sentences) {
              lines.push("");
              lines.push("No sentence list is available.");
              return lines;
            }

            if (sentences.length === 0) {
              lines.push("");
              lines.push("No sentences.");
              return lines;
            }

            lines.push("");
            for (const sentence of sentences.slice(0, 10)) {
              lines.push(`- ${formatSentence(sentence)}`);
            }

            const omittedCount = sentences.length - 10;
            if (omittedCount > 0) {
              lines.push(`- Omitted ${omittedCount} more sentences.`);
            }

            if (String(sentences.length) !== String(totalCount || sentences.length)) {
              lines.push("");
              lines.push(`List count: ${sentences.length}; reported count: ${valueOrDash(totalCount)}.`);
            }

            return lines;
          };

          const baselineSource = `Category description commit ${valueOrDash(process.env.BASELINE_SOURCE_COMMIT)}`;

          const lines = [
            "## Hitokoto Sentences Sync Summary",
            "",
            `Initialize mode: ${valueOrDash(process.env.INITIALIZE_MODE)}`,
            `Baseline source: ${baselineSource}`,
            `Category description before sync: ${valueOrDash(process.env.CATEGORY_DESCRIPTION)}`,
            `Current source commit: ${valueOrDash(process.env.CURRENT_SOURCE_COMMIT)}`,
            `Category description after sync: ${valueOrDash(process.env.UPDATED_CATEGORY_DESCRIPTION)}`,
            "",
            "### Step Status",
            "",
            "| Step | Outcome |",
            "| --- | --- |",
            `| Checkout | ${stepOutcome(process.env.CHECKOUT_OUTCOME)} |`,
            `| Setup Node.js | ${stepOutcome(process.env.SETUP_NODE_OUTCOME)} |`,
            `| Fetch source repository | ${stepOutcome(process.env.FETCH_SOURCE_OUTCOME)} |`,
            `| Merge JSON files | ${stepOutcome(process.env.MERGE_OUTCOME)} |`,
            `| Upload merged artifact | ${stepOutcome(process.env.UPLOAD_ARTIFACT_OUTCOME)} |`,
            `| Find or create bundle category | ${stepOutcome(process.env.CATEGORY_OUTCOME)} |`,
            `| Build previous file from category description | ${stepOutcome(process.env.BUILD_PREVIOUS_OUTCOME)} |`,
            `| Diff sentences | ${stepOutcome(process.env.DIFF_OUTCOME)} |`,
            `| Delete removed sentences via API | ${stepOutcome(process.env.DELETE_OUTCOME)} |`,
            `| Upload new sentences via API | ${stepOutcome(process.env.UPLOAD_OUTCOME)} |`,
            `| Update category cursor | ${stepOutcome(process.env.UPDATE_CURSOR_OUTCOME)} |`,
            "",
            "### Counts",
            "",
            `- Previous merged sentences: ${countValue(process.env.PREVIOUS_SENTENCE_COUNT)}`,
            `- Current merged sentences: ${countValue(process.env.CURRENT_SENTENCE_COUNT)}`,
            `- New sentences in diff: ${countValue(process.env.ADDED_SENTENCE_COUNT)}`,
            `- Removed sentences in diff: ${countValue(process.env.REMOVED_SENTENCE_COUNT)}`,
            `- API uploaded sentences: ${countValue(process.env.UPLOADED_SENTENCE_COUNT)}`,
            `- API deleted sentences: ${countValue(process.env.DELETED_SENTENCE_COUNT)}`,
            `- Existing sentences skipped before upload: ${countValue(process.env.SKIPPED_EXISTING_SENTENCE_COUNT)}`,
            "",
            ...renderSentenceList("New Sentences", process.env.ADDED_JSON_FILE, process.env.ADDED_SENTENCE_COUNT),
            "",
            ...renderSentenceList("Removed Sentences", process.env.REMOVED_JSON_FILE, process.env.REMOVED_SENTENCE_COUNT),
            "",
          ];

          fs.appendFileSync(summaryPath, `${lines.join("\n")}\n`, "utf8");
          EOF

