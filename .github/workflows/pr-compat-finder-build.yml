name: PR compat-finder package Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: pr-compat-finder-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build compat-finder Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # https://github.com/actions/checkout/releases/tag/v6.0.3
      - name: Build with composite action
        uses: ./.github/actions/build-package
        with:
          build-command: pnpm compat-finder:build
          artifact-name: compat-finder-dist
          artifact-path: packages/compat-finder/dist
