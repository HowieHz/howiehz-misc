name: Release Packages

on:
  push:
    branches: [main]

concurrency:
  group: release-packages
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare release packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has-changesets: ${{ steps.changesets.outputs.hasChangesets }}
      has-release-packages: ${{ steps.release-packages.outputs.has_packages }}
      package-directories-json: ${{ steps.release-packages.outputs.package_directories_json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # https://github.com/pnpm/action-setup/releases/tag/v6.0.3
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # https://github.com/actions/setup-node/releases/tag/v6.4.0
        with:
          node-version: 24
          cache: "pnpm"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create or update release pull request
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # https://github.com/changesets/action/releases/tag/v1.7.0
        with:
          version: pnpm changeset:version
          title: "release: update package versions"
          commit: "release: update package versions"
        env:
          GITHUB_TOKEN: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}

      - name: Resolve packages to publish
        id: release-packages
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: node .github/scripts/resolve-release-packages.js

  build-packages:
    name: Build and attest release packages
    needs: prepare-release
    if: needs.prepare-release.outputs.has-release-packages == 'true'
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/reusable-build-packages.yml
    with:
      artifact-name: npm-package-artifacts
      package-directories-json: ${{ needs.prepare-release.outputs.package-directories-json }}

  verify-attestations:
    name: Verify package attestations
    needs: [prepare-release, build-packages]
    if: needs.prepare-release.outputs.has-release-packages == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: npm-package-artifacts
          path: dist/npm-packages

      - name: Verify package attestations from reusable workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/reusable-build-packages.yml
        run: |
          shopt -s nullglob
          packages=(dist/npm-packages/*.tgz)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No npm package artifacts found for attestation verification." >&2
            exit 1
          fi

          pids=()
          for package in "${packages[@]}"; do
            (
              gh attestation verify "$package" \
                --repo "${GITHUB_REPOSITORY}" \
                --signer-workflow "${SIGNER_WORKFLOW}"
            ) &
            pids+=("$!")
          done

          for pid in "${pids[@]}"; do
            wait "$pid"
          done

  publish-packages:
    name: Publish packages to npm
    needs: [prepare-release, build-packages, verify-attestations]
    if: needs.prepare-release.outputs.has-release-packages == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          sparse-checkout: |
            package.json
          sparse-checkout-cone-mode: false

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # https://github.com/pnpm/action-setup/releases/tag/v6.0.3
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # https://github.com/actions/setup-node/releases/tag/v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # https://github.com/actions/download-artifact/releases/tag/v8.0.1
        with:
          name: npm-package-artifacts
          path: dist/npm-packages

      - name: Publish package tarballs
        run: |
          shopt -s nullglob
          packages=(dist/npm-packages/*.tgz)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No npm package artifacts found for publishing." >&2
            exit 1
          fi

          for package in "${packages[@]}"; do
            npm publish "$package" --access public --provenance
          done

  create-github-releases:
    name: Create GitHub releases
    needs: [prepare-release, publish-packages]
    if: needs.prepare-release.outputs.has-release-packages == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          token: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}
          sparse-checkout: |
            .github/scripts
            packages

      - name: Create Git tags and GitHub releases
        env:
          GITHUB_TOKEN: ${{ secrets.PR_WORKFLOW_TOKEN || github.token }}
          PACKAGE_DIRECTORIES_JSON: ${{ needs.prepare-release.outputs.package-directories-json }}
        run: node .github/scripts/create-github-releases.js
