name: Reusable Build Release Packages

on:
  workflow_call:
    inputs:
      artifact-name:
        required: false
        type: string
        default: npm-package-artifacts
        description: Name of the uploaded package artifact bundle
      package-directories-json:
        required: true
        type: string
        description: JSON array of workspace package directories to pack

jobs:
  build:
    name: Build, Pack, Upload, and Attest Release Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout Source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # https://github.com/actions/checkout/releases/tag/v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # https://github.com/pnpm/action-setup/releases/tag/v6.0.9
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # https://github.com/actions/setup-node/releases/tag/v7.0.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pack release package tarballs
        env:
          PACKAGE_DIRECTORIES_JSON: ${{ inputs.package-directories-json }}
        run: |
          node --input-type=module <<'EOF'
          import { mkdir } from "node:fs/promises";
          import path from "node:path";
          import { spawnSync } from "node:child_process";

          const packageDirectories = JSON.parse(process.env.PACKAGE_DIRECTORIES_JSON ?? "[]");

          if (!Array.isArray(packageDirectories) || packageDirectories.length === 0) {
            console.error("No package directories were provided for packing.");
            process.exit(1);
          }

          const packDestination = path.resolve("dist/npm-packages");
          await mkdir(packDestination, { recursive: true });

          for (const directory of packageDirectories) {
            if (typeof directory !== "string" || directory.length === 0) {
              console.error(`Invalid package directory: ${directory}`);
              process.exit(1);
            }

            const result = spawnSync(
              "pnpm",
              ["pack", "--pack-destination", packDestination],
              {
                cwd: path.resolve(directory),
                stdio: "inherit",
                shell: process.platform === "win32",
              },
            );

            if (result.status !== 0) {
              process.exit(result.status ?? 1);
            }
          }
          EOF

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # https://github.com/actions/upload-artifact/releases/tag/v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: dist/npm-packages/*.tgz

      - name: Generate package attestations
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # https://github.com/actions/attest/releases/tag/v4.2.0
        with:
          subject-path: dist/npm-packages/*.tgz
