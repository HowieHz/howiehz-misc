name: Update Google Java Format

on:
  schedule:
    # 21:30 UTC = 05:30 Asia/Shanghai on the next day.
    - cron: "30 21 * * *"
  workflow_dispatch:

concurrency:
  group: update-google-java-format
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # https://github.com/actions/checkout/releases/tag/v7.0.1

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # https://github.com/pnpm/action-setup/releases/tag/v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # https://github.com/actions/setup-node/releases/tag/v7.0.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update google-java-format
        id: update-google-java-format
        run: node .github/scripts/update-google-java-format.js

      - name: Require PR workflow token
        if: ${{ steps.update-google-java-format.outputs.changed == 'true' }}
        env:
          PR_WORKFLOW_TOKEN: ${{ secrets.PR_WORKFLOW_TOKEN }}
        run: |
          if [ -z "$PR_WORKFLOW_TOKEN" ]; then
            echo "PR_WORKFLOW_TOKEN is required so updater PRs trigger normal CI." >&2
            exit 1
          fi

      - name: Create Pull Request
        if: ${{ steps.update-google-java-format.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # https://github.com/peter-evans/create-pull-request/releases/tag/v8.1.1
        with:
          token: ${{ secrets.PR_WORKFLOW_TOKEN }}
          commit-message: "chore: update google-java-format"
          title: "chore: update google-java-format"
          body: |
            This PR updates `google-java-format` tracked in `scripts/format-java.js`.

            Resolved by automation:
            - google-java-format version: `${{ steps.update-google-java-format.outputs.version }}`
            - SHA256: `${{ steps.update-google-java-format.outputs.sha256 }}`

            The updater only changes the tracked version and SHA256. It does not run the newly downloaded formatter jar before review; normal PR CI should validate formatting after the update is reviewed.
          branch: chore/update-google-java-format
          delete-branch: true
          labels: dependencies
