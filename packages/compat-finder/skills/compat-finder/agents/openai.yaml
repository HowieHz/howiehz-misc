interface:
  display_name: "Compat Finder"
  short_description: "Narrow incompatible targets with compat-finder"
  default_prompt: "Use $compat-finder whenever the user is using compat-finder, continuing a compat-finder narrowing session, interpreting `interactive` or `next` output or CLI parser errors, choosing between guided and automatic triage, selecting between `binary-split` and `leave-one-out`, or turning ordered versions, plugins, mods, flags, or config targets into a compat-finder workflow. Use it for locale, undo, accepted answers, extra-answer validation, persistence, save/resume, and session API versus lower-level state API questions. Do not use it for generic test planning, git bisect, or unrelated troubleshooting."
