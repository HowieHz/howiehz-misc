interface:
  display_name: "Compat Finder"
  short_description: "Narrow incompatible targets with compat-finder"
  default_prompt: "Use $compat-finder whenever the user is actively using compat-finder, continuing a compat-finder session, or clearly trying to turn versions, plugins, mods, flags, or plugin/mod files used as targets into a compat-finder workflow, even if they do not repeat the package name in every follow-up. Use it to narrow which version, target, flag, or configuration introduced a regression, continue a triage session from prior `issue` or `pass` answers, choose between guided and automatic triage, interpret `interactive` or `next` output, answer locale or undo questions, or pick the CLI versus the TypeScript session/state APIs. Do not use it for generic test planning, unrelated troubleshooting, or git bisect workflows."
