interface:
  display_name: "Compat Finder"
  short_description: "Narrow incompatible targets with compat-finder"
  default_prompt: "Use $compat-finder when the task is specifically about the compat-finder package, CLI, prior pass/issue answers, `interactive` or `next` output, or the TypeScript session/state APIs. Use it to narrow which version, target, flag, or configuration introduced a regression, continue a compat-finder triage session, choose between guided and automatic triage, pick the CLI or library API, interpret compat-finder output, or update compat-finder package docs and skill assets in this repository. Do not use it for generic test planning, unrelated troubleshooting, or git bisect workflows."
